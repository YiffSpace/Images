services:
  images:
    build: .
    env_file: .env
    restart: unless-stopped
    init: true
    hostname: images.containers.local
    labels:
      - "hostname=images.containers.local"
    volumes:
      - ./data:/app/data
  redis:
    image: redis:8.6.2-alpine
    restart: unless-stopped
    init: true
    hostname: redis.images.containers.local
    labels:
      - "hostname=redis.images.containers.local"

networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.19.1.56/29
    driver_opts:
      com.docker.network.bridge.name: br-images
